<!doctype html>
<html lang="pt-br">
  <head>

    <title>Framework Header</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="header__nav" aria-label="Navegação principal">

          id="m-btn" aria-expanded="false"

            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
          </svg>
        </button>

        <ul class="header__menu" id="m-nav" role="list">
          <li><a href="#servicos" class="header__link">Serviços</a></li>
          <li><a href="#projetos" class="header__link">Projetos</a></li>
          <li><a href="#contato" class="header__link">Contato</a></li>

<script src="/script.js"></script>
