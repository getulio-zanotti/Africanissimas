<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footer</title>
    <link rel="stylesheet" href="/style/style.css" />
    <link rel="stylesheet" href="/style/footer.css" />
  </head>
  <body>
    <footer class="footer">
      <div class="footer__container">
        <div class="footer__content">
          <div class="footer__brand">
            <a href="/" class="footer__logo">Africaníssimas</a>
            <p class="footer__description">Moda, beleza & poder.</p>
          </div>

          <div class="footer__links">
            <h3 class="footer__title">Links Rápidos</h3>
            <ul class="footer__list" role="list">
              <li><a href="#servicos" class="footer__link">Serviços</a></li>
              <li><a href="#projetos" class="footer__link">Projetos</a></li>
              <li><a href="#contato" class="footer__link">Contato</a></li>
            </ul>
          </div>

          <div class="footer__links">
            <h3 class="footer__title">Redes Sociais</h3>
            <ul class="footer__list" role="list">
              <li>
                <a href="#" aria-label="Instagram" class="footer__social-link"
                  >Instagram</a
                >
              </li>
              <li>
                <a href="#" aria-label="Facebook" class="footer__social-link"
                  >Facebook</a></li>
            </ul>
          </div>
        </div>

        <div class="copyright">
          <p>&copy; Africaníssimas. Todos os direitos reservados.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
